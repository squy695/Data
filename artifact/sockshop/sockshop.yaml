apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    name: rabbitmq
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
      annotations:
        prometheus.io/scrape: 'true'
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3.6.8-management
        ports:
        - containerPort: 15672
          name: management
        - containerPort: 5672
          name: rabbitmq
        securityContext:
          capabilities:
            drop:
              - all
            add:
              - CHOWN
              - SETGID
              - SETUID
              - DAC_OVERRIDE
          readOnlyRootFilesystem: true
        env:
          - name: ZIPKIN
            value: http://zipkin.jaeger.svc.cluster.local:9411/api/v1/spans
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://otelcollector:4317"
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: "service.name=rabbitmq,service.version=1.0.0"
        resources:
          limits:
            cpu: 100m
            memory: 1000Mi
          requests:
            cpu: 50m
            memory: 300Mi
      - name: rabbitmq-exporter
        image: kbudde/rabbitmq-exporter
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
          name: exporter
#      nodeSelector:
#        beta.kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  annotations:
        prometheus.io/scrape: 'true'
  labels:
    name: rabbitmq
  
spec:
  ports:
    # the port that this service should serve on
  - port: 5672
    name: rabbitmq
    targetPort: 5672
  - port: 9090
    name: exporter
    targetPort: exporter
    protocol: TCP
  selector:
    app: rabbitmq
