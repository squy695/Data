apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
    spec:
      containers:
      - name: front-end
        image: weaveworksdemos/front-end:0.3.12
        resources:
          limits:
            cpu: 100m
            memory: 3000Mi
          requests:
            cpu: 50m
            memory: 300Mi
        ports:
        - containerPort: 8079
        env:
        - name: SESSION_REDIS
          value: "true"
        - name: ZIPKIN
          value: http://zipkin.jaeger.svc.cluster.local:9411/api/v1/spans
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otelcollector:4317"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=front-end,service.version=1.0.0"
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - all
          readOnlyRootFilesystem: true
        #livenessProbe:
        # httpGet:
        #    path: /
        #    port: 8079
        #  initialDelaySeconds: 30
        #  periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 8079
          initialDelaySeconds: 30
          periodSeconds: 15
#      nodeSelector:
#        beta.kubernetes.io/os: linux

---
apiVersion: v1
kind: Service
metadata:
  name: front-end
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8079"
  labels:
    name: front-end
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8079
  selector:
    app: front-end


---
apiVersion: v1
kind: Service
metadata:
  name: front-end-nodeport
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8079"
  labels:
    name: front-end
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 8079
    nodePort: 30695
  selector:
    app: front-end


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  labels:
    name: carts
  
spec:
  replicas: 6
  selector:
    matchLabels:
      app: carts
  template:
    metadata:
      labels:
        app: carts
    spec:
      containers:
      - name: carts
        image: weaveworksdemos/carts:0.4.8
        env:
         - name: JAVA_OPTS
           value: -Xms64m -Xmx128m -XX:+UseG1GC -Djava.security.egd=file:/dev/urandom -Dspring.zipkin.enabled=false
         - name: ZIPKIN
           value: http://zipkin.jaeger.svc.cluster.local:9411/api/v1/spans
         - name: OTEL_EXPORTER_OTLP_ENDPOINT
           value: "http://otelcollector:4317"
         - name: OTEL_RESOURCE_ATTRIBUTES
           value: "service.name=carts,service.version=1.0.0"
        resources:
          limits:
            cpu: 1000m
            memory: 2000Mi
          requests:
            cpu: 100m
            memory: 200Mi
        ports:
        - containerPort: 80
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
              - all
            add:
              - NET_BIND_SERVICE
          readOnlyRootFilesystem: true
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 90
          periodSeconds: 15
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory
#      nodeSelector:
#        beta.kubernetes.io/os: linux
#        kubernetes.io/hostname: lab-desktop
---
apiVersion: v1
kind: Service
metadata:
  name: carts
  annotations:
